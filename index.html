<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerung Highway Resort | Nuwakot Express</title>
    <style>
        :root { --red: #d90429; --dark: #2b2d42; --white: #edf2f4; --green: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--white); padding-bottom: 120px; }
        header { background: var(--red); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Menu Cards */
        .item { background: white; padding: 12px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--red); }
        .info { flex: 1; margin-left: 15px; }
        .info h3 { margin: 0; color: var(--dark); }
        .add-btn { background: var(--red); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Bottom Floating Bar */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); box-sizing: border-box; z-index: 50; }
        .order-btn { background: var(--green); color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }

        /* Modal Overlay */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
        input, select { width: 100%; padding: 14px; margin-top: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        label { font-weight: bold; display: block; margin-top: 10px; color: var(--dark); }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">Kerung Highway Resort</h2>
    <p style="margin:5px 0 0 0;">Owner: Rabindra Chalise | Nuwakot</p>
</header>

<div class="container" id="menu-list">
    <div class="item">
        <div class="info"><h3>Chicken Thali (Special)</h3><p>Rs. 350</p></div>
        <button class="add-btn" onclick="addToCart('Chicken Thali', 350)">Add +</button>
    </div>
    <div class="item">
        <div class="info"><h3>Chicken Momo</h3><p>Rs. 150</p></div>
        <button class="add-btn" onclick="addToCart('Chicken Momo', 150)">Add +</button>
    </div>
    <div class="item">
        <div class="info"><h3>Chowmein</h3><p>Rs. 120</p></div>
        <button class="add-btn" onclick="addToCart('Chowmein', 120)">Add +</button>
    </div>
    <div class="item">
        <div class="info"><h3>Cold Drink / Coffee</h3><p>Rs. 100</p></div>
        <button class="add-btn" onclick="addToCart('Drink/Coffee', 100)">Add +</button>
    </div>
</div>

<div class="bottom-bar">
    <div>Total: <span id="total-price" style="font-size: 1.2rem; font-weight:bold; color:var(--red);">Rs. 0</span></div>
    <button class="order-btn" onclick="openOrder()">Send Order</button>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3>Final Details</h3>
        
        <label>What do you need?</label>
        <select id="serviceType" onchange="checkService()">
            <option value="Delivery">Food Delivery</option>
            <option value="Pre-order">Pre-order (Dine-in)</option>
            <option value="Room Booking">Book a Room</option>
        </select>

        <div id="locationDiv">
            <label>Location:</label>
            <select id="userLoc">
                <option value="Battar">Battar</option>
                <option value="Hawaghar">Hawaghar</option>
                <option value="Bidur">Bidur</option>
                <option value="Dhunga">Dhunga</option>
                <option value="Betrawoti">Betrawoti</option>
                <option value="Trisuli">Trisuli</option>
            </select>
        </div>

        <input type="text" id="userName" placeholder="Your Name">
        <input type="tel" id="userPhone" placeholder="Mobile Number">
        
        <button class="order-btn" style="width:100%; margin-top:20px;" onclick="finishOrder()">Confirm via WhatsApp</button>
        <button onclick="closeOrder()" style="width:100%; background:none; border:none; margin-top:10px; color:grey;">Cancel</button>
    </div>
</div>

<script>
    let cart = [];

    function addToCart(name, price) {
        cart.push({name, price});
        let total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total-price').innerText = `Rs. ${total}`;
    }

    function openOrder() { 
        if(cart.length === 0 && document.getElementById('serviceType').value !== 'Room Booking') {
            alert("Please add items or select Room Booking!");
            return;
        }
        document.getElementById('orderModal').style.display = 'flex'; 
    }
    
    function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }

    function checkService() {
        const type = document.getElementById('serviceType').value;
        const locDiv = document.getElementById('locationDiv');
        // Hide location if they are coming to the hotel
        locDiv.style.display = (type === 'Delivery') ? 'block' : 'none';
    }

    function finishOrder() {
        const type = document.getElementById('serviceType').value;
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const loc = (type === 'Delivery') ? document.getElementById('userLoc').value : "At Resort";

        if(!name || !phone) return alert("Please enter Name and Phone!");

        const items = cart.map(i => i.name).join(", ");
        const total = cart.reduce((sum, item) => sum + item.price, 0);

        let msg = `*ORDER FOR RABINDRA CHALISE*%0A`;
        msg += `*Service:* ${type}%0A`;
        msg += `*Name:* ${name}%0A`;
        msg += `*Location:* ${loc}%0A`;
        msg += `*Phone:* ${phone}%0A`;
        
        if(type !== 'Room Booking') {
            msg += `*Items:* ${items}%0A`;
            msg += `*Total:* Rs. ${total}`;
        } else {
            msg += `*Request:* I want to book a room. Please send photos and price.`;
        }
        
        // Your Dad's Number
        window.open(`https://wa.me/9779851254049?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
